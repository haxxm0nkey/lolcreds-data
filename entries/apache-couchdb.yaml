id: apache-couchdb
name: Apache CouchDB
category: database
vendor: Apache Software Foundation
author: haxxm0nkey

credentials:
- id: admin-password
  name: Server Administrator Password
  description: >
    CouchDB server administrators are configured in the last [admins] section
    read from ini files such as local.ini and files under local.d.
  type: username_password
  nature: [user_defined]
  sensitivity: secret
  looks_like:
  - pattern: '(?m)^\[admins\]\s*$'
    detail: CouchDB admin section marker; admin assignments below contain passwords or password hashes
  - pattern: '(?m)^\s*[A-Za-z0-9_.@-]{1,128}\s*=\s*[^#;\r\n]{1,255}$'
    detail: CouchDB [admins] username=password or username=hash entry; use only with [admins] context
  location:
  - type: environment
    path: COUCHDB_USER, COUCHDB_PASSWORD
    detail: Official CouchDB container bootstrap admin variables
  - type: config_file
    path: local.ini, default.ini, 10-admins.ini, vm.args
    detail: CouchDB ini and runtime files; exact local.d filenames vary by deployment
  - type: secret_store
    detail: Container secrets, Kubernetes Secrets, cloud secret managers, and deployment vaults
  - type: source_code
    detail: Docker Compose files, Helm values, tests, and accidentally committed local.ini files
  - type: logs
    detail: Startup errors, setup logs, and provisioning traces that reveal admin configuration
  - type: public_interface
    path: tcp/5984, /_utils/, /_session
    detail: CouchDB HTTP API and Fauxton login endpoint
  notes: >
    There is no universal CouchDB admin password. local.d/*.ini is intentionally
    not used as a scanner path because template globs are out of scope.

- id: user-database-password
  name: _users Database Password
  description: >
    CouchDB stores regular users separately from server administrators in the
    _users database. Users authenticate to CouchDB HTTP APIs with configured auth handlers.
  type: username_password
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: database
    path: _users
    detail: CouchDB users database containing user documents and password material
  - type: http_header
    path: Authorization
    detail: Basic or Bearer authentication accepted by configured CouchDB auth handlers
  - type: config_file
    path: local.ini, default.ini
    detail: CouchDB authentication handler and proxy/JWT/cookie configuration
  - type: secret_store
    detail: Password vaults, CI/CD variables, and cloud secret managers
  - type: source_code
    detail: Replication scripts, application clients, tests, and committed URLs
  - type: logs
    detail: HTTP access logs, replication errors, and client debug output

- id: cookie-secret
  name: Cookie Authentication Secret
  description: >
    CouchDB cookie authentication uses secret material in ini configuration to
    sign authentication cookies when configured.
  type: secret_value
  nature: [generated_on_install, user_defined]
  sensitivity: secret
  looks_like:
  - pattern: '(?i)^\s*secret\s*=\s*[^#;\r\n]{16,255}$'
    detail: CouchDB cookie/auth secret assignment in ini configuration
  location:
  - type: config_file
    path: local.ini, default.ini
    detail: CouchDB chttpd_auth/httpd auth secret configuration
  - type: secret_store
    detail: Container secrets, deployment vaults, and cloud secret managers
  - type: logs
    detail: Debug logs and support bundles

references:
- type: docs
  url: https://docs.couchdb.org/en/stable/config/auth.html
- type: docs
  url: https://docs.couchdb.org/en/stable/config/intro.html
- type: docs
  url: https://hub.docker.com/_/couchdb
