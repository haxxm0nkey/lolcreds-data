id: apache-airflow
name: Apache Airflow
category: ci_cd
vendor: Apache Software Foundation
author: haxxm0nkey

credentials:
- id: fernet-key
  name: Fernet Key
  description: >
    Airflow encrypts sensitive connection and variable values at rest with a
    fernet key. A leaked fernet key plus metadata DB access can decrypt stored
    connection passwords and variable values.
  type: secret_value
  nature: [generated_on_install]
  sensitivity: secret
  looks_like:
  - example: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    pattern: '\b[A-Za-z0-9_-]{43}='
    detail: Fernet key shape commonly used by Airflow for encrypted metastore secrets
  location:
  - type: environment
    path: AIRFLOW__CORE__FERNET_KEY
  - type: config_file
    platform: [linux]
    path: ~/airflow/airflow.cfg, /opt/airflow/airflow.cfg
    detail: Airflow default/home and container configuration files
  - type: config_file
    path: airflow.cfg
    detail: Project-local Airflow configuration file
  - type: secret_store
    detail: Kubernetes Secrets, Helm secrets, cloud secret managers, and Airflow secrets backends
  - type: source_code
    detail: Committed airflow.cfg, deployment manifests, and test configs
  - type: logs
    detail: Startup logs and support bundles

- id: webserver-secret-key
  name: Webserver Secret Key
  description: >
    Airflow webserver uses a secret key for signing web sessions and CSRF state.
  type: secret_value
  nature: [generated_on_install]
  sensitivity: secret
  location:
  - type: environment
    path: AIRFLOW__WEBSERVER__SECRET_KEY, AIRFLOW__API_AUTH__JWT_SECRET
    detail: Airflow config environment variables for webserver signing and API JWT secret where applicable
  - type: config_file
    platform: [linux]
    path: ~/airflow/airflow.cfg, /opt/airflow/airflow.cfg, ~/airflow/webserver_config.py, /opt/airflow/webserver_config.py
    detail: Airflow webserver/API secret-key configuration files
  - type: config_file
    path: airflow.cfg, webserver_config.py
    detail: Project-local Airflow webserver config files
  - type: secret_store
    detail: Kubernetes Secrets, Helm secrets, and cloud secret managers
  - type: source_code
    detail: Committed configs and deployment manifests

- id: connection-secret
  name: Connection / Variable Secret
  description: >
    Airflow stores credentials for external systems as Connections and Variables
    in the metastore, exact AIRFLOW_CONN/AIRFLOW_VAR environment variables, or
    configured secrets backends.
  type: secret_value
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: database
    detail: Airflow metadata database storing encrypted connection and variable values
  - type: config_file
    platform: [linux]
    path: ~/airflow/airflow.cfg, /opt/airflow/airflow.cfg
    detail: Airflow configuration and secrets backend settings
  - type: config_file
    path: airflow.cfg
    detail: Project-local Airflow configuration
  - type: secret_store
    detail: HashiCorp Vault, AWS Secrets Manager, GCP Secret Manager, Azure Key Vault, Kubernetes Secrets, environment variables, and custom backends
  - type: source_code
    detail: DAG repositories, tests, committed connection URIs, variables, and examples
  - type: logs
    detail: Task logs, connection debugging, scheduler output, and webserver traces
  notes: >
    Airflow supports arbitrary AIRFLOW_CONN_<CONN_ID> and AIRFLOW_VAR_<KEY> names;
    those are intentionally not listed as wildcard environment locations.

- id: admin-user-password
  name: Web UI User Password
  description: >
    Airflow web UI users authenticate through the configured auth manager or
    webserver auth backend. Local user credentials are deployment-specific and
    often provisioned by CLI, containers, Helm, or secrets backends.
  type: username_password
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: environment
    path: AIRFLOW_WWW_USER_USERNAME, AIRFLOW_WWW_USER_PASSWORD
    detail: Airflow container/init examples commonly use these exact bootstrap variables
  - type: database
    detail: Airflow metadata database user tables for local auth configurations
  - type: public_interface
    path: /login, /api/
    detail: Airflow webserver UI and API login contexts
  - type: secret_store
    detail: Helm secrets, Kubernetes Secrets, password vaults, and identity-provider secrets
  - type: source_code
    detail: Docker Compose files, Helm values, local development configs, and deployment automation
  - type: logs
    detail: Setup output and authentication traces
  notes: >
    There is no universal Airflow administrator password.

references:
- type: docs
  url: https://airflow.apache.org/docs/apache-airflow/stable/security/secrets/secrets-backend/index.html
- type: docs
  url: https://airflow.apache.org/docs/apache-airflow/stable/security/secrets/fernet.html
- type: docs
  url: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html
