id: gitlab
name: GitLab
category: ci_cd
vendor: GitLab
author: haxxm0nkey
credentials:
- id: user-or-admin-password
  name: GitLab User / Administrator Password
  description: GitLab users, administrators, service accounts, or break-glass accounts
    may authenticate to product consoles, CLIs, APIs, SSO flows, or associated integrations
    with user-defined passwords or federated login flows.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: public_interface
    path: GitLab web console, admin portal, CLI login, API login, or SSO/OAuth authorization
      endpoint
  - type: secret_store
    detail: password managers, enterprise IdP stores, break-glass admin vaults, CI/CD
      variables, and managed credential stores
  - type: config_file
    detail: SSO connector configs, local CLI profiles, application settings, scripts,
      and integration definitions
  - type: logs
    detail: audit logs, sign-in logs, admin events, access logs, CLI debug output,
      and support traces
  notes: Catalogs ordinary operational credential locations; this is not a claim of
    a static vendor default password.
- id: product-api-token-or-key
  name: GitLab Product API Token / Key
  description: 'GitLab exposes product API credentials represented in Betterleaks
    detector coverage (gitlab-cicd-job-token, gitlab-deploy-token, gitlab-feature-flag-client-token,
    gitlab-feed-token, gitlab-incoming-mail-token, gitlab-kubernetes-agent-token,
    gitlab-oauth-app-secret, gitlab-pat, gitlab-pat-routable, gitlab-pat-routable-versioned,
    gitlab-ptt, gitlab-rrt, gitlab-runner-authentication-token, gitlab-runner-authentication-token-routable,
    gitlab-scim-token, gitlab-session-cookie). These credentials commonly authorize
    account, workspace, project, or integration-level API operations. '
  type: token
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer, Basic, API-key, or product-specific authorization header used
      by SDKs and API clients
  - type: http_response
    detail: token, key, OAuth, webhook, or credential creation responses where the
      product displays the secret value once
  - type: config_file
    detail: GitLab CLI/SDK config, CI config, and runner config files
    path: ~/.python-gitlab.cfg, .gitlab-ci.yml, config.toml, glab-cli/config.yml
  - type: environment
    path: GITLAB_TOKEN, GITLAB_ACCESS_TOKEN, GITLAB_API_TOKEN, GL_TOKEN, GITLAB_PRIVATE_TOKEN
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, platform secret stores, password
      vaults, and integration vaults
  - type: source_code
    detail: application code, automation scripts, notebooks, tests, examples, infrastructure-as-code,
      and committed config files
  - type: logs
    detail: API debug logs, CLI traces, webhook/integration logs, CI output, exception
      traces, and support bundles
  notes: 'Betterleaks detector rule IDs covered by this product entry: gitlab-cicd-job-token,
    gitlab-deploy-token, gitlab-feature-flag-client-token, gitlab-feed-token, gitlab-incoming-mail-token,
    gitlab-kubernetes-agent-token, gitlab-oauth-app-secret, gitlab-pat, gitlab-pat-routable,
    gitlab-pat-routable-versioned, gitlab-ptt, gitlab-rrt, gitlab-runner-authentication-token,
    gitlab-runner-authentication-token-routable, gitlab-scim-token, gitlab-session-cookie.
    This block is product-focused; generic token/JWT/private-key handling stays in
    the consuming product context.'
  looks_like:
  - example: glpat-0123456789abcdef0123
    pattern: glpat-[A-Za-z0-9_\-]{20,}
    detail: GitLab personal/project/group/impersonation token prefix
  - example: gldt-0123456789abcdef0123
    pattern: gldt-[A-Za-z0-9_\-]{20,}
    detail: GitLab deploy token prefix
  - example: glrt-0123456789abcdef0123
    pattern: glrtr?-[A-Za-z0-9_\-]{20,}
    detail: GitLab runner authentication token prefix
  - example: glcbt-0123456789abcdef0123
    pattern: glcbt-[A-Za-z0-9_\-]{20,}
    detail: GitLab CI/CD job token prefix
  - example: glptt-0123456789abcdef0123
    pattern: glptt-[A-Za-z0-9_\-]{20,}
    detail: GitLab pipeline trigger token prefix
  - example: glft-0123456789abcdef0123
    pattern: glft-[A-Za-z0-9_\-]{20,}
    detail: GitLab feed token prefix
  - example: glimt-0123456789abcdef0123
    pattern: glimt-[A-Za-z0-9_\-]{20,}
    detail: GitLab incoming mail token prefix
- id: oauth-application-credential
  name: GitLab OAuth / Application Credential
  description: GitLab OAuth apps, marketplace apps, service principals, integrations,
    or installed applications can use client IDs, client secrets, access tokens, refresh
    tokens, and app installation credentials.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer access token or Basic client authentication
  - type: http_response
    detail: OAuth token responses containing access_token, refresh_token, id_token,
      token_type, scope, and expiry fields
  - type: config_file
    detail: 'OAuth app configs, SDK settings, integration manifests, .env files, callback
      handlers, and service configs; Removed generic/common scanner surface path(s)
      from product template: .env'
    path: gitlab-oauth.json, oauth.json, config.yml
  - type: environment
    path: GITLAB_CLIENT_SECRET, GITLAB_ACCESS_TOKEN, GITLAB_REFRESH_TOKEN
    detail: OAuth client secret and token env vars; client ID is context, not secret
      material
  - type: secret_store
    detail: OAuth client secret stores, CI/CD variables, cloud secret managers, enterprise
      vaults, and app-installation secret stores
  - type: source_code
    detail: OAuth callback code, app manifests, automation scripts, test fixtures,
      and examples
  - type: logs
    detail: OAuth exchange logs, callback logs, API traces, and failed auth errors
  looks_like:
  - example: gloas-0123456789abcdef0123
    pattern: gloas-[A-Za-z0-9_\-]{20,}
    detail: GitLab OAuth application secret prefix from GitLab token docs
- id: ci-cd-runner-and-deploy-secret
  name: GitLab CI/CD Runner, Deploy, or Automation Secret
  description: GitLab can store runner registration tokens, deploy keys, repository
    tokens, package publishing credentials, webhook secrets, and automation variables
    used by builds and deployments.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: config_file
    detail: Pipeline YAML, runner configs, deploy-token/package configs, and deployment
      manifests
    path: .gitlab-ci.yml, config.toml, deploy-token.json, package-credentials.json
  - type: environment
    path: GITLAB_TOKEN, GITLAB_API_TOKEN, GITLAB_DEPLOY_TOKEN, GITLAB_PASSWORD
  - type: secret_store
    detail: CI/CD secret variables, project/org secret stores, package registry secrets,
      cloud secret managers, and vaults
  - type: source_code
    detail: pipeline definitions, build scripts, Dockerfiles, release scripts, and
      committed examples
  - type: artifact
    detail: build artifacts, runner workdirs, caches, release bundles, and support
      bundles
  - type: logs
    detail: pipeline logs, runner logs, deployment logs, package publish output, and
      CLI debug traces
references:
- type: docs
  url: https://raw.githubusercontent.com/betterleaks/betterleaks/main/config/betterleaks.toml
