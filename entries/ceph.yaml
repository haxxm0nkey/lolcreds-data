id: ceph
name: Ceph
category: cloud
vendor: Ceph
author: haxxm0nkey
credentials:
- id: cephx-keyring
  name: CephX Client Keyring
  description: 'Ceph users authenticate with secret keys stored in keyrings. Ceph
    documents that clients specify a user name and a keyring containing the secret
    key, and that client.admin is assumed if no user is specified.

    '
  type: secret_value
  nature:
  - generated_on_install
  sensitivity: secret
  looks_like:
  - pattern: key\s*=\s*[A-Za-z0-9+/=]{20,}
    detail: Ceph keyring secret key assignment
  location:
  - type: config_file
    detail: Exact Ceph keyring files containing user names and secret keys
    path: /etc/ceph/ceph.client.admin.keyring, /etc/ceph/ceph.keyring, ~/.ceph/ceph.client.admin.keyring,
      ceph.client.admin.keyring, ceph.client.rgw.keyring
  - type: secret_store
    detail: Kubernetes Secrets, Rook secrets, cloud secret managers, and deployment
      vaults
  - type: source_code
    detail: accidentally committed keyrings, test clusters, and deployment manifests
  - type: artifact
    detail: host backups, VM images, and container images containing /etc/ceph
  - type: logs
    detail: command history, debugging output, and CI traces
  notes: 'Keyrings are bearer-like secrets for Ceph capabilities. client.admin keys
    are highly privileged.

    '
- id: radosgw-s3-key
  name: RADOS Gateway S3 Access / Secret Key
  description: 'Ceph Object Gateway users can have S3-style access keys and secret
    keys. These credentials authenticate S3 clients to RGW and are managed as Ceph
    object gateway user credentials.

    '
  type: api_key
  nature:
  - generated_on_install
  sensitivity: secret
  looks_like:
  - pattern: "(?i)(rgw|radosgw|ceph)(?:[ \t\\w.-]{0,30})(access[_-]?key|secret[_-]?key)\\\
      s*[=:]\\s*[^\\s,}\\]]{8,255}"
    detail: Contextual Ceph RGW access/secret key assignment
  location:
  - type: config_file
    path: ceph.conf, radosgw-admin.json, rclone.conf
    detail: Ceph/RGW administration exports and product-local object-gateway client
      config; generic AWS env vars belong to canonical AWS scanning
  - type: secret_store
    detail: Kubernetes Secrets, cloud secret managers, CI/CD variables, and object-store
      vault entries
  - type: source_code
    detail: S3 client scripts, tests, and accidentally committed configs
  - type: logs
    detail: S3 client debug logs and CI output
  - type: http_header
    path: Authorization
    detail: S3 Signature authentication headers derived from access and secret keys
  notes: 'RGW key blast radius depends on the user''s bucket and capability grants.

    '
references:
- type: docs
  url: https://docs.ceph.com/en/latest/rados/operations/user-management/
- type: docs
  url: https://docs.ceph.com/en/latest/rados/configuration/ceph-conf/
