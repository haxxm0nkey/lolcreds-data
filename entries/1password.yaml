id: 1password
name: 1Password
category: saas
vendor: 1Password
author: haxxm0nkey

credentials:
- id: user-or-admin-password
  name: 1Password User / Administrator Password
  description: >
    1Password users and administrators authenticate to 1Password accounts,
    admin consoles, CLI sign-in flows, browser extensions, and SSO/federated
    login flows with user-defined account passwords or identity-provider credentials.
  type: username_password
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: public_interface
    path: /signin, /sign-in, /admin
    detail: 1Password web sign-in, admin console, and identity-provider login contexts
  - type: config_file
    platform:
    - linux
    path: ~/.config/op/config, ~/.op/config, ~/.config/1Password/1Password.sqlite, ~/.config/1Password/logs/1Password_rCURRENT.log
    detail: Unix-like 1Password CLI, desktop, account, and log files where sign-in context may appear
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.config\op\config, %USERPROFILE%\.op\config, %APPDATA%\1Password\1Password.sqlite, %LOCALAPPDATA%\1Password\logs\1Password_rCURRENT.log'
    detail: Windows 1Password CLI, desktop, account, and log files where sign-in context may appear
  - type: secret_store
    detail: Enterprise identity provider stores, break-glass admin vaults, password managers, and SSO connector secrets
  - type: logs
    detail: 1Password application, CLI, audit, and support logs may contain sign-in context but should not contain raw account passwords
  notes: >
    This block catalogs ordinary operational login locations and does not claim a
    static vendor default password.

- id: account-secret-key
  name: 1Password Account Secret Key
  description: >
    1Password account Secret Keys are user/account enrollment secrets with a stable
    A3-formatted value. Betterleaks detects these with the 1password-secret-key rule.
    Exposure may assist account compromise when combined with the account password
    and other sign-in factors.
  type: secret_value
  nature: [generated_on_install]
  sensitivity: secret
  looks_like:
  - example: A3-ABC123-ABCDEFGHIJK-ABCDE-ABCDE-ABCDE
    pattern: '\bA3-[A-Z0-9]{6}-(?:(?:[A-Z0-9]{11})|(?:[A-Z0-9]{6}-[A-Z0-9]{5}))-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}\b'
    detail: Compatible with Betterleaks rule 1password-secret-key
  - example: A3-ABC123-ABC123-ABCDE-ABCDE-ABCDE-ABCDE
    pattern: '\bA3-[A-Z0-9]{6}-(?:(?:[A-Z0-9]{11})|(?:[A-Z0-9]{6}-[A-Z0-9]{5}))-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}\b'
    detail: Alternate segmented Secret Key form accepted by the Betterleaks-compatible pattern
  location:
  - type: config_file
    platform:
    - linux
    path: ~/.config/op/config, ~/.op/config, ~/.config/1Password/1Password.sqlite, ~/Downloads/1Password Emergency Kit.pdf
    detail: Unix-like account configuration, local app data, CLI config, and Emergency Kit locations where account Secret Keys may appear
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.config\op\config, %USERPROFILE%\.op\config, %APPDATA%\1Password\1Password.sqlite, %USERPROFILE%\Downloads\1Password Emergency Kit.pdf'
    detail: Windows account configuration, local app data, CLI config, and Emergency Kit locations where account Secret Keys may appear
  - type: artifact
    path: 1Password Emergency Kit.pdf, Emergency Kit.pdf
    detail: Exported Emergency Kit, printed recovery artifacts, screenshots, or support attachments containing an A3 Secret Key
  - type: source_code
    path: README.md, onboarding.md, runbook.md, secrets.txt, credentials.txt
    detail: Project-local documentation or onboarding material that may accidentally include account Secret Keys
  - type: logs
    detail: CLI debug output, support bundles, screenshots, and onboarding traces may accidentally expose an account Secret Key
  notes: >
    Betterleaks applies a low-entropy filter to reduce false positives. A scanner
    should treat A3 Secret Key findings as sensitive only when the full grouped
    format is present.

- id: service-account-token
  name: 1Password Service Account Token
  description: >
    1Password service account tokens authorize non-interactive access to vaults
    through 1Password CLI and automation. Betterleaks detects these with the
    1password-service-account-token rule and validates them using the 1Password
    Events API auth introspection endpoint.
  type: token
  nature: [generated_on_install, user_defined]
  sensitivity: secret
  looks_like:
  - example: ops_eyJAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    pattern: 'ops_eyJ[a-zA-Z0-9+/]{250,}={0,3}'
    detail: Compatible with Betterleaks rule 1password-service-account-token
  location:
  - type: environment
    path: OP_SERVICE_ACCOUNT_TOKEN
  - type: http_header
    path: Authorization
    detail: Bearer token used by 1Password service-account-backed automation and validation requests
  - type: config_file
    platform:
    - linux
    path: ~/.config/op/config, ~/.op/config
    detail: Unix-like 1Password CLI configuration files that may reference service account authentication
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.config\op\config, %USERPROFILE%\.op\config'
    detail: Windows 1Password CLI configuration files that may reference service account authentication
  - type: config_file
    path: .env, docker-compose.yml, docker-compose.yaml, values.yaml, terraform.tfvars, provider.tf, main.tf, Makefile, Taskfile.yml, Jenkinsfile
    detail: Automation, container, Helm, Terraform, and CI/CD files that may contain OP_SERVICE_ACCOUNT_TOKEN
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, Kubernetes Secrets, Terraform variables, and automation vaults
  - type: source_code
    detail: Automation repositories, CI/CD definitions, scripts, examples, and application code that may embed or reference service account tokens
  - type: logs
    detail: CLI debug logs, CI output, Terraform/provider logs, and exception traces may expose service account tokens
  notes: >
    Betterleaks validates service account tokens via https://events.1password.com/api/v2/auth/introspect.
    Do not validate automatically unless the scanner's validation mode allows outbound token checks.

- id: connect-api-token
  name: 1Password Connect API Token
  description: >
    1Password Connect API tokens authorize clients to read or manage vault items
    through a 1Password Connect server. Tokens are commonly provided to CLI,
    SDK, Kubernetes, Terraform, and application integrations.
  type: token
  nature: [generated_on_install, user_defined]
  sensitivity: secret
  location:
  - type: environment
    path: OP_CONNECT_TOKEN
  - type: http_header
    path: Authorization
    detail: Bearer token used for 1Password Connect API calls
  - type: config_file
    platform:
    - linux
    path: ~/.config/op/config, ~/.op/config, ~/.op/1password-credentials.json
    detail: Unix-like 1Password Connect and CLI configuration files
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.config\op\config, %USERPROFILE%\.op\config, %USERPROFILE%\.op\1password-credentials.json'
    detail: Windows 1Password Connect and CLI configuration files
  - type: config_file
    path: .env, docker-compose.yml, docker-compose.yaml, values.yaml, connect.json, 1password-credentials.json, provider.tf, main.tf
    detail: Project, container, Helm, SDK, Terraform, and application files that may contain OP_CONNECT_TOKEN
  - type: secret_store
    detail: Kubernetes Secrets, Docker secrets, CI/CD variables, cloud secret managers, and deployment vaults
  - type: source_code
    detail: Application, infrastructure-as-code, and CI/CD files that may embed 1Password Connect tokens
  - type: logs
    detail: Connect server logs, client debug traces, SDK errors, and CI output may expose Connect tokens
  notes: >
    OP_CONNECT_HOST is Connect server endpoint context and is intentionally not
    listed as a credential-value environment variable. 1Password Connect token
    formats may vary and are not modeled here with a stable product-specific regex.

- id: connect-server-credentials
  name: 1Password Connect Server Credentials File
  description: >
    1Password Connect Server uses a 1password-credentials.json file. Official
    Connect configuration documents OP_SESSION as the path to this file or the
    Base64-encoded contents of the credentials file, with a default path under
    ~/.op.
  type: secret_value
  nature: [generated_on_install]
  sensitivity: secret
  location:
  - type: environment
    path: OP_SESSION
    detail: For 1Password Connect containers, OP_SESSION can contain the path to or Base64-encoded content of 1password-credentials.json
  - type: config_file
    platform:
    - linux
    path: ~/.op/1password-credentials.json
    detail: Official default Connect credentials file path on Unix-like systems
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.op\1password-credentials.json'
    detail: Windows home-relative equivalent for the Connect credentials file
  - type: config_file
    path: 1password-credentials.json, docker-compose.yml, docker-compose.yaml, values.yaml, deployment.yaml
    detail: Project, container, Kubernetes, and Helm deployment files for 1Password Connect
  - type: secret_store
    detail: Kubernetes Secrets, Docker secrets, CI/CD variables, cloud secret managers, and deployment vaults
  - type: logs
    detail: Connect startup logs, container environment dumps, CI output, and deployment troubleshooting traces
  notes: >
    OP_SESSION is overloaded: 1Password CLI docs describe it as a CLI session token,
    while Connect server docs describe it as credentials-file path or Base64 content.
    This block models the Connect-server credential-file usage.

- id: cli-session-token
  name: 1Password CLI Session Token
  description: >
    1Password CLI can use session environment variables for account sessions.
    These tokens are local authentication artifacts and should be treated as secrets
    when captured from shells, process environments, logs, or scripts.
  type: token
  nature: [generated_on_install]
  sensitivity: secret
  location:
  - type: environment
    path: OP_SESSION
  - type: config_file
    platform:
    - linux
    path: ~/.config/op/config, ~/.op/config, ~/.zshrc, ~/.bashrc, ~/.profile, .env
    detail: Unix-like shell and 1Password CLI configuration files that may persist session-related environment variables
  - type: config_file
    platform:
    - windows
    path: '%USERPROFILE%\.config\op\config, %USERPROFILE%\.op\config, %USERPROFILE%\Documents\WindowsPowerShell\Microsoft.PowerShell_profile.ps1, %USERPROFILE%\.env'
    detail: Windows shell and 1Password CLI configuration files that may persist session-related environment variables
  - type: logs
    detail: Shell history, CLI debug output, terminal transcripts, and CI output may expose session tokens
  notes: >
    OP_ACCOUNT is contextual rather than secret material, so it is not listed as a
    credential-value environment location. Use account context near OP_SESSION or
    other 1Password token material during triage.

- id: scim-or-integration-secret
  name: 1Password SCIM / Integration Secret
  description: >
    1Password-related integrations can use SCIM bearer tokens, OAuth app secrets,
    webhook signing secrets, bot tokens, app install tokens, and third-party
    connector credentials alongside 1Password automation.
  type: secret_value
  nature: [generated_on_install, user_defined]
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization, X-API-Key, X-Signature, X-Hub-Signature-256
    detail: Authorization or webhook signature headers used by app integrations and provisioning clients
  - type: config_file
    path: .env, docker-compose.yml, docker-compose.yaml, values.yaml, scim.env, scim.json, oauth.json, manifest.json
    detail: Project-local OAuth, SCIM, webhook, and integration configuration files
  - type: secret_store
    detail: SaaS app secret stores, CI/CD variables, cloud secret managers, password vaults, and enterprise integration vaults
  - type: source_code
    detail: Integration repos, webhooks, app backends, tests, examples, and CI/CD files
  - type: logs
    detail: OAuth exchange logs, webhook logs, API debug traces, provisioning logs, SCIM bridge logs, and audit events
  notes: >
    Generic names such as SCIM_TOKEN, WEBHOOK_SECRET, and CLIENT_SECRET were not
    listed as 1Password product-owned environment locations because they are not
    specific to 1Password. Keep those as generic scanner/context detections unless
    a concrete 1Password integration documents an exact variable name.

references:
- type: docs
  url: https://developer.1password.com/docs/cli/environment-variables/
- type: docs
  url: https://developer.1password.com/docs/service-accounts/use-with-1password-cli/
- type: docs
  url: https://developer.1password.com/docs/connect/get-started/
- type: docs
  url: https://developer.1password.com/docs/connect/connect-server-configuration/
- type: docs
  url: https://raw.githubusercontent.com/betterleaks/betterleaks/main/config/betterleaks.toml
