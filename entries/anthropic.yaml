id: anthropic
name: Anthropic Claude API
category: ai_api
vendor: Anthropic
author: haxxm0nkey

credentials:

- id: api-key
  name: Anthropic API Key
  description: >
    Anthropic Claude API requests authenticate with an API key from the
    Anthropic Console. Anthropic documents x-api-key as the API-key header.
  type: api_key
  nature: [user_defined]
  sensitivity: secret
  looks_like:
  - example: sk-ant-api03-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    pattern: 'sk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{20,}'
    detail: Anthropic Console API key form commonly seen for Claude API keys.
  location:
  - type: environment
    path: ANTHROPIC_API_KEY
  - type: http_header
    path: x-api-key, X-Api-Key
    detail: Anthropic API key header.
  - type: source_code
    detail: application config, scripts, notebooks, examples, committed .env files
  - type: config_file
    detail: .env, local shell profiles, deployment manifests, server config
    path: .env
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, platform environment stores
  - type: logs
    detail: HTTP client debug logs that include x-api-key or Authorization headers
  - type: config_file
    path: .env, config.yml, config.yaml, values.yaml
    detail: Project-local configuration filenames; lower-confidence fallback scan targets
  notes: >
    API keys and short-lived workload identity bearer tokens are different
    credential types. API keys are long-lived bearer secrets from Console;
    workload identity bearer tokens are obtained through the OAuth token
    endpoint and should be triaged by their identity provider and lifetime.

- id: auth-token
  name: Anthropic Authorization Bearer Token
  description: >
    The official Python SDK can authenticate with a static bearer token via
    ANTHROPIC_AUTH_TOKEN. The SDK sends this value in the Authorization header.
  type: token
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: environment
    path: ANTHROPIC_AUTH_TOKEN
  - type: http_header
    path: Authorization
    detail: Bearer token used by Anthropic SDK clients when auth_token is set.
  - type: source_code
    detail: application config, scripts, notebooks, examples, committed .env files
  - type: config_file
    path: .env, config.yml, config.yaml, values.yaml
    detail: Project-local configuration filenames; lower-confidence fallback scan targets
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, platform environment stores
  - type: logs
    detail: HTTP client debug logs that include Authorization headers
  notes: >
    This is distinct from the long-lived Console API key. The token value is
    opaque in official source, so no looks_like pattern is included.

- id: workload-identity-bearer-token
  name: Workload Identity Bearer Token
  description: >
    Anthropic supports Authorization: Bearer *** for Workload Identity
    Federation. These are short-lived access tokens obtained from the
    Anthropic OAuth token endpoint rather than static Console API keys.
  type: token
  nature: [generated_on_install]
  sensitivity: secret
  location:
  - type: environment
    path: ANTHROPIC_IDENTITY_TOKEN
  - type: http_header
    path: Authorization
    detail: Bearer token used for Anthropic Workload Identity Federation requests
  - type: config_file
    path: ~/.config/anthropic/credentials/default.json
    detail: Default profile credentials file used by the Anthropic SDK on Linux and macOS; additional profile names use the same credentials directory but are omitted to avoid globs.
    platform:
    - linux
  - type: config_file
    path: '%APPDATA%\Anthropic\credentials\default.json'
    detail: Default profile credentials file used by the Anthropic SDK on Windows; additional profile names use the same credentials directory but are omitted to avoid globs.
    platform:
    - windows
  - type: logs
    detail: workload identity exchange logs and HTTP client debug output
  - type: secret_store
    detail: workload runtime token caches and orchestration platforms
  - type: config_file
    path: .env, config.yml, config.yaml, values.yaml
    detail: Project-local configuration filenames; lower-confidence fallback scan targets
  notes: >-
    These tokens are intentionally short-lived and opaque. Exposure still matters during the token lifetime, and the upstream identity federation rule should be reviewed if tokens appear outside the intended workload. Workload identity also uses ANTHROPIC_IDENTITY_TOKEN_FILE, ANTHROPIC_FEDERATION_RULE_ID, ANTHROPIC_ORGANIZATION_ID, ANTHROPIC_SERVICE_ACCOUNT_ID, ANTHROPIC_WORKSPACE_ID, and ANTHROPIC_SCOPE; those metadata/path variables are not listed as credential-value environment locations except for ANTHROPIC_IDENTITY_TOKEN, which directly contains token material.

- id: webhook-signing-key
  name: Webhook Signing Key
  description: >
    Anthropic SDK clients can load a webhook signing key from
    ANTHROPIC_WEBHOOK_SIGNING_KEY for webhook verification.
  type: secret_value
  nature: [user_defined]
  sensitivity: secret
  location:
  - type: environment
    path: ANTHROPIC_WEBHOOK_SIGNING_KEY
  - type: source_code
    detail: application config and webhook verification code
  - type: config_file
    path: .env, config.yml, config.yaml, values.yaml
    detail: Project-local configuration filenames; lower-confidence fallback scan targets
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, platform environment stores
  - type: logs
    detail: webhook verification debug logs or environment dumps
  notes: >
    The signing key shape is not specified in the checked official source, so no
    looks_like pattern is included.

references:
- type: docs
  url: https://docs.anthropic.com/en/api/getting-started
- type: docs
  url: https://docs.anthropic.com/en/api/admin-api/apikeys/get-api-key
- type: source
  url: https://github.com/anthropics/anthropic-sdk-python/blob/main/src/anthropic/_client.py
- type: source
  url: https://github.com/anthropics/anthropic-sdk-python/blob/main/src/anthropic/lib/credentials/_constants.py
- type: source
  url: https://github.com/anthropics/anthropic-sdk-python/blob/main/src/anthropic/lib/credentials/_providers.py
