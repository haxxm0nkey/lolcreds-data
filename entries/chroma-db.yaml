- type: docs
  url: https://docs.trychroma.com/docs/run-chroma/client-server
- type: docs
  url: https://docs.trychroma.com/docs/run-chroma/clients
- type: docs
  url: https://docs.trychroma.com/reference/chroma-reference
- type: docs
  url: https://github.com/chroma-core/chroma/blob/main/chromadb/config.py
