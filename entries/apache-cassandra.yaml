id: apache-cassandra
name: Apache Cassandra
category: database
vendor: Apache Software Foundation
author: haxxm0nkey

credentials:
- id: password-authenticator-role
  name: PasswordAuthenticator Role Password
  description: >
    Cassandra PasswordAuthenticator uses username/password pairs and stores
    usernames and hashed passwords in system_auth.roles.
  type: username_password
  nature: [user_defined]
  sensitivity: secret
  looks_like:
  - pattern: '(?i)CREATE\s+ROLE\s+\S+\s+WITH\s+PASSWORD\s*=\s*''[^''\r\n]+'''
    detail: Cassandra CQL role password assignment
  - pattern: '(?i)ALTER\s+ROLE\s+\S+\s+WITH\s+PASSWORD\s*=\s*''[^''\r\n]+'''
    detail: Cassandra CQL role password change statement
  location:
  - type: database
    path: system_auth.roles
    detail: Cassandra system_auth table storing role names and hashed passwords
  - type: config_file
    path: cassandra.yaml, cqlshrc, ~/.cassandra/cqlshrc
    detail: Server auth settings and client-side CQL shell credentials
  - type: secret_store
    detail: Kubernetes Secrets, cloud secret managers, CI/CD variables, and password vault entries
  - type: source_code
    detail: Application connection config, migration scripts, tests, and accidentally committed credentials
  - type: logs
    detail: Failed authentication traces, driver debug logs, and CI output
  - type: public_interface
    path: tcp/9042
    detail: Cassandra native transport login endpoint

- id: cassandra-yaml-auth-disabled
  name: AllowAllAuthenticator / AllowAllAuthorizer Configuration
  description: >
    Cassandra AllowAllAuthenticator performs no checks and AllowAllAuthorizer
    allows any action to any user.
  type: other
  nature: [unauthenticated_default, user_defined]
  sensitivity: context_dependent
  default:
    username: null
    password: null
  looks_like:
  - pattern: 'authenticator:\s*(?:AllowAllAuthenticator|org\.apache\.cassandra\.auth\.AllowAllAuthenticator)'
    detail: cassandra.yaml setting that disables authentication checks
  - pattern: 'authorizer:\s*(?:AllowAllAuthorizer|org\.apache\.cassandra\.auth\.AllowAllAuthorizer)'
    detail: cassandra.yaml setting that disables authorization checks
  location:
  - type: config_file
    path: cassandra.yaml
    detail: Cassandra server configuration controlling authentication and authorization backends
  - type: source_code
    detail: Helm charts, container images, Ansible roles, and committed Cassandra configs
  - type: image
    detail: VM or container images containing insecure cassandra.yaml settings
  notes: >
    This is absence of authentication/authorization, not a blank password.

- id: tls-keystore-password
  name: TLS Keystore / Truststore Password
  description: >
    Cassandra supports node-to-node and client encryption using Java keystores
    and truststores. cassandra.yaml references keystores, truststores, and their passwords.
  type: password
  nature: [user_defined]
  sensitivity: secret
  looks_like:
  - pattern: '(?:keystore_password|truststore_password):\s*[^\s#]+'
    detail: Cassandra YAML keystore or truststore password assignment
  location:
  - type: config_file
    path: cassandra.yaml
    detail: server_encryption_options and client_encryption_options keystore/truststore passwords
  - type: secret_store
    detail: Kubernetes Secrets, Java keystore stores, cloud secret managers, and deployment vaults
  - type: source_code
    detail: Helm values, Docker Compose files, Ansible inventories, and committed TLS config
  - type: logs
    detail: Startup logs and troubleshooting output that include TLS option dumps

references:
- type: docs
  url: https://cassandra.apache.org/doc/latest/cassandra/managing/configuration/cass_yaml_file.html
- type: source
  url: https://github.com/apache/cassandra/blob/trunk/conf/cassandra.yaml
