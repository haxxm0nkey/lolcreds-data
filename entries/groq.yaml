id: groq
name: GroqCloud
category: ai_api
vendor: Groq
author: haxxm0nkey
credentials:
- id: api-key
  name: API Key
  description: 'GroqCloud API keys authenticate requests to Groq''s OpenAI-compatible
    API. Groq''s quickstart documents exporting the key as GROQ_API_KEY and sending
    it as a Bearer token in the Authorization header.

    '
  type: api_key
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - example: gsk_ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZ
    pattern: gsk_[A-Z0-9]{52}
    detail: Groq API key shape from public scanner rules
  location:
  - type: environment
    path: GROQ_API_KEY
  - type: http_header
    path: Authorization
    detail: Bearer token used by Groq API calls
  - type: source_code
    detail: scripts, inference services, notebooks, committed .env files
  - type: config_file
    detail: Groq/OpenAI-compatible gateway and application config files
    path: litellm.yaml, groq.json, groq.yaml, config.yaml
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, hosted app settings
  - type: logs
    detail: HTTP client debug logs and request dumps with Authorization headers
  notes: 'Groq exposes OpenAI-compatible endpoints, so Groq keys are often placed
    in code paths originally written for OpenAI-style clients. Check both provider-specific
    GROQ_API_KEY variables and generic LLM gateway config.

    '
references:
- type: docs
  url: https://console.groq.com/docs/quickstart
- type: docs
  url: https://console.groq.com/docs/api-reference
