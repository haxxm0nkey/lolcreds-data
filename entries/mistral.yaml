id: mistral
name: Mistral AI
category: ai_api
vendor: Mistral AI
author: haxxm0nkey
credentials:
- id: api-key
  name: API Key
  description: 'Mistral AI API keys authenticate requests to api.mistral.ai. Mistral''s
    API reference documents Authorization: Bearer headers and SDK examples using MISTRAL_API_KEY.

    '
  type: api_key
  nature:
  - user_defined
  sensitivity: secret
  location:
  - type: environment
    path: MISTRAL_API_KEY
  - type: http_header
    path: Authorization
    detail: Bearer token used by Mistral API calls
  - type: source_code
    detail: apps, notebooks, inference workers, committed .env files
  - type: config_file
    detail: '.env, deployment manifests, server config, shell profiles; Removed generic/common
      scanner surface path(s) from product template: .env'
    path: mistral.json, mistral.yaml, litellm.yaml, config.yaml
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, hosted app settings
  - type: logs
    detail: HTTP debug output or gateway logs containing Authorization headers
  notes: 'Mistral keys are opaque bearer credentials with no reliable public prefix
    in the referenced docs. They commonly appear in OpenAI-compatible client configuration
    because many SDKs can target Mistral with a custom base URL.

    '
  looks_like:
  - example: 0123456789ABCDEFGHIJKLMNOPQRSTUV
    pattern: '[A-Z0-9]{32}'
    detail: Mistral API key shape from public scanner rules; use with Mistral context
references:
- type: docs
  url: https://docs.mistral.ai/getting-started/quickstart/
- type: docs
  url: https://docs.mistral.ai/api/
