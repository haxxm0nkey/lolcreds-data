id: cursor
name: Cursor
category: ai_api
vendor: Anysphere
author: haxxm0nkey
credentials:
- id: provider-api-key
  name: Model Provider API Key
  description: Cursor supports user-supplied API keys for model providers and may
    store or reference them through editor settings, workspace files, environment
    variables, and OS secret storage.
  type: api_key
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - example: sk-proj-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    pattern: sk-(proj|svcacct)-[A-Za-z0-9_-]{20,255}
    detail: OpenAI project/service-account API key used as Cursor custom provider
      key
  - example: sk-ant-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    pattern: sk-ant-[A-Za-z0-9_-]{20,255}
    detail: Anthropic API key used as Cursor custom provider key
  - example: AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    pattern: AIza[0-9A-Za-z_-]{35}
    detail: Google API key used by Gemini integrations
  location:
  - type: environment
    path: OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY, GEMINI_API_KEY, GOOGLE_GENERATIVE_AI_API_KEY,
      AZURE_OPENAI_API_KEY, OPENROUTER_API_KEY
  - type: config_file
    platform:
    - linux
    path: ~/.config/Cursor/User/settings.json, ~/.config/Cursor/User/globalStorage/state.vscdb
    detail: Cursor user settings and extension/global storage on Unix-like systems
  - type: config_file
    platform:
    - windows
    path: '%APPDATA%\Cursor\User\settings.json, %APPDATA%\Cursor\User\globalStorage\state.vscdb'
    detail: Cursor user settings and extension/global storage on Windows
  - type: config_file
    path: .cursor/mcp.json, .cursor/rules, .cursor/rules.json, .vscode/settings.json,
      devcontainer.json, .devcontainer/devcontainer.json
    detail: Project-local Cursor/MCP/rules/workspace configuration files
  - type: secret_store
    detail: Cursor/VS Code SecretStorage, OS keychain, password vaults, CI/CD variables,
      and cloud secret managers
  - type: source_code
    detail: MCP server config, custom tools, notebooks, scripts, examples, test fixtures,
      and committed agent settings
  - type: logs
    detail: Cursor logs, extension host logs, MCP logs, terminal transcripts, request
      debug output, and crash reports
  notes: Cursor documentation describes custom API-key configuration, but no stable
    Cursor-specific provider-token prefix was found. Prefer provider-specific regexes
    and exact editor/workspace locations.
- id: cursor-account-token
  name: Cursor Account Token
  description: Cursor account/session authentication state may be present in editor
    storage or OS secret storage.
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: config_file
    platform:
    - linux
    path: ~/.config/Cursor/User/globalStorage/state.vscdb
  - type: config_file
    platform:
    - windows
    path: '%APPDATA%\Cursor\User\globalStorage\state.vscdb'
  - type: secret_store
    detail: OS keychain or VS Code-compatible SecretStorage used by Cursor account
      authentication
  - type: logs
    detail: Cursor account/auth troubleshooting output and extension host logs
  notes: Account tokens are not known to have a stable public prefix; this entry relies
    on exact Cursor storage surfaces rather than value shape.
- id: mcp-server-secret
  name: MCP Server Secret
  description: Cursor MCP server configuration can contain API keys, bearer tokens,
    or command environment variables for tools used by the editor agent.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  location:
  - type: config_file
    path: .cursor/mcp.json, mcp.json, .vscode/mcp.json
    detail: Cursor/VS Code MCP server config files
  - type: environment
    path: GITHUB_TOKEN, GH_TOKEN, OPENAI_API_KEY, ANTHROPIC_API_KEY
  - type: secret_store
    detail: Password vaults, OS keychain, and CI/developer-environment secret stores
      referenced by MCP servers
  - type: source_code
    detail: MCP server command definitions, wrapper scripts, and agent tool configs
  - type: logs
    detail: MCP server stdout/stderr, Cursor logs, and terminal transcripts
  notes: MCP secrets vary by server; only exact common env vars with strong provider
    patterns are included.
- id: cursor-api-key
  name: Cursor API Key
  description: Cursor Integrations/API keys can authenticate to Cursor API endpoints.
    Public scanner rules identify key_ followed by 64 lowercase hex characters in
    Cursor context.
  type: api_key
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - example: key_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    pattern: key_[0-9a-f]{64}
    detail: Cursor API key shape from public scanner rules
  location:
  - type: http_header
    path: Authorization
    detail: Cursor API authentication header context
  - type: config_file
    path: cursor.json, cursor.config.json
    detail: Cursor integration/API client config
  - type: secret_store
    detail: CI/CD variables, cloud secret managers, and developer vaults
  - type: source_code
    detail: Cursor integration tooling, scripts, and tests
  - type: logs
    detail: Cursor API client debug output and HTTP traces
  notes: No generic Cursor account/session-token shape is modeled here; this block
    is for Cursor API keys with the public key_ shape.
references:
- type: docs
  url: https://docs.cursor.com/en/account/api-keys
  note: Cursor API-key/account documentation.
- type: docs
  url: https://docs.cursor.com/en/context/mcp
  note: Cursor MCP configuration documentation.
- type: docs
  url: https://docs.cursor.com/en/context/rules
  note: Cursor project configuration/rules documentation.
