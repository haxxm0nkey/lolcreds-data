id: elasticsearch
name: Elasticsearch
category: database
vendor: Elastic
author: haxxm0nkey
credentials:
- id: elastic-built-in-user
  name: elastic Built-in Superuser Password
  description: 'Elasticsearch includes built-in users for the Elastic Stack. The elastic
    user is a built-in superuser used to set other built-in user passwords and to
    bootstrap administrative access on self-managed clusters.

    '
  type: username_password
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  default:
    username: elastic
    password: null
  location:
  - type: public_interface
    path: Elasticsearch HTTP API, Kibana login
  - type: config_file
    detail: Bootstrap password may be set in Elasticsearch keystore/config or orchestration
      config
    path: elasticsearch.yml, elasticsearch.keystore, docker-compose.yml
  - type: environment
    path: ELASTIC_PASSWORD
    detail: commonly used by Docker and orchestration examples to set the initial
      elastic password
  - type: secret_store
    detail: Kubernetes Secrets, Docker secrets, Elastic Cloud orchestration secrets,
      CI/CD variables
  - type: logs
    detail: initial startup/setup logs, installation notes, and bootstrap tooling
      output
  notes: 'The default block records the built-in username, not a static password.
    Elastic documents that built-in users cannot authenticate until their passwords
    have been set; if elastic has no password, a transient bootstrap password is used
    to run password-setup tooling.

    '
- id: built-in-service-user-passwords
  name: Built-in Service User Passwords
  description: 'Elasticsearch built-in service users such as kibana_system, logstash_system,
    beats_system, apm_system, and remote_monitoring_user have fixed privileges and
    require operator-set passwords before use.

    '
  type: username_password
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: (xpack\.[A-Za-z0-9_.-]+\.elasticsearch\.(username|password)|elasticsearch\.(username|password)):\s*[^\s]+
    detail: Elastic Stack component configuration that stores Elasticsearch usernames
      or passwords
  location:
  - type: config_file
    detail: Elastic Stack component configs containing Elasticsearch usernames/passwords
    path: kibana.yml, logstash.yml, beats.yml, apm-server.yml, metricbeat.yml, filebeat.yml,
      elastic-agent.yml
  - type: environment
    path: ELASTICSEARCH_USERNAME, ELASTICSEARCH_PASSWORD, KIBANA_PASSWORD
  - type: secret_store
    detail: Kubernetes Secrets, Docker secrets, Elastic Cloud orchestration secrets
  - type: source_code
    detail: Helm values, docker-compose.yml, Ansible inventories, committed stack
      configs
  notes: 'These accounts are not intended for human login. A leaked service-user password
    grants the component privileges assigned to that built-in user.

    '
- id: api-key
  name: Elasticsearch API Key
  description: 'Elasticsearch API keys authenticate requests to Elasticsearch APIs.
    The create API key endpoint returns an id, api_key value, and an encoded representation
    for Authorization headers.

    '
  type: api_key
  nature:
  - generated_on_install
  sensitivity: secret
  looks_like:
  - example: ApiKey ZXhhbXBsZTpleGFtcGxl
    pattern: ApiKey\s+[A-Za-z0-9+/=_\-]+
    detail: HTTP Authorization value for Elasticsearch API key authentication
  - example: essu_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-ABCDEFGHIJKLMNOPQRSTUVWXYZ
    pattern: essu_[A-Za-z0-9_\-]{60,200}={0,2}
    detail: Elastic Cloud Serverless API key shape from public scanner rules
  location:
  - type: http_header
    path: Authorization
    detail: ApiKey authorization scheme
  - type: http_response
    detail: create API key responses containing id, api_key, and encoded fields
  - type: environment
    path: ELASTICSEARCH_API_KEY
  - type: config_file
    detail: Elastic clients, ingestion agents, Beats, Logstash, and application config
    path: elasticsearch.yml, kibana.yml, logstash.conf, logstash.yml, filebeat.yml,
      metricbeat.yml, elastic-agent.yml
  - type: secret_store
    detail: Kubernetes Secrets, CI/CD variables, application secret stores
  - type: source_code
    detail: ingestion scripts, notebooks, app config, committed examples
  notes: 'API key privileges are derived from the creating user and requested role
    descriptors. Treat encoded API key values as bearer credentials.

    '
- id: service-account-token
  name: Service Account Token
  description: 'Elasticsearch service account tokens authenticate Elastic Stack services
    to Elasticsearch without using built-in user passwords. Tokens can be file-backed
    or index-backed depending on how they are created.

    '
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer token for Elasticsearch service account authentication
  - type: config_file
    detail: File-backed Elasticsearch service tokens and Elastic component configs
    path: /etc/elasticsearch/service_tokens, service_tokens, elasticsearch.yml, kibana.yml,
      elastic-agent.yml
  - type: secret_store
    detail: Kubernetes Secrets and orchestration-managed service token stores
  notes: 'Service account tokens are bearer secrets scoped to a service account. Rotate
    and invalidate tokens found in config backups or deployment logs. Environment
    variable storage noted but omitted from CredsHound location data because no exact
    variable name is documented: service token variables used by containers or Helm
    charts'
references:
- type: docs
  url: https://www.elastic.co/guide/en/elasticsearch/reference/current/built-in-users.html
- type: docs
  url: https://www.elastic.co/guide/en/elasticsearch/reference/current/security-minimal-setup.html
- type: docs
  url: https://www.elastic.co/guide/en/elasticsearch/reference/current/security-api-create-api-key.html
- type: docs
  url: https://www.elastic.co/guide/en/elasticsearch/reference/current/service-accounts.html
